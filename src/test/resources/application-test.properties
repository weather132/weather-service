# =========================================================
# Spring Application (Test)
# =========================================================
spring.application.name=climate-test


# =========================================================
# Database (H2 In-Memory)
# =========================================================
spring.datasource.url=jdbc:h2:mem:climate_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.data-locations=classpath:data-h2.sql


# =========================================================
# Logging
# =========================================================
logging.level.root=WARN
logging.level.com.github.yun531.climate=DEBUG


# =========================================================
# Firebase
# =========================================================
firebase.service-account-path=dummy-not-used-in-test


# =========================================================
# Snapshot API
# =========================================================
snapshot.api.base-url=http://localhost:19090
snapshot.api.connect-timeout-ms=2000
snapshot.api.read-timeout-ms=5000


# =========================================================
# Snapshot Cache Policy
# =========================================================
snapshot.cache.snap-ttl-minutes=180
snapshot.cache.recompute-threshold-minutes=165


# =========================================================
# Forecast Policy
# =========================================================
forecast.hourly.max-shift-hours=2
forecast.hourly.window-size=24


# =========================================================
# Notification Policy
# =========================================================
notification.max-region-count=3
notification.max-shift-hours=2
notification.window-hours=24
notification.threshold-pop=60
notification.max-points=26


# =========================================================
# Notification Warning Cache
# =========================================================
notification.warning.cache-ttl-minutes=45
notification.warning.default-since-hours=2


# =========================================================
# Notification Trigger
# =========================================================
notification.trigger.hourly-topic=hourly
notification.trigger.daily-topic-prefix=daily_
notification.trigger.ttl-seconds=600


# =========================================================
# Internal API
# =========================================================
notification.internal-api.enabled=true
